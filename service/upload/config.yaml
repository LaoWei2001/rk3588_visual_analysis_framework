# Unified upload config
#
# 方案2: 下面的 api_url / api_key / url 是「默认地址」。
#   每条 Redis 消息可自带 dify_api_url / dify_api_key / server_url(由 C++ 按通道下发);
#   消息里填了就用消息里的, 留空才回落到这里的默认值。
#   => 不同通道可上报到不同地址; 网页编辑器「上报配置」节点逐通道填写。

# Dify config (默认地址, 通道留空时使用)
dify:
  api_url: http://192.168.2.98:8015
  api_key: "app-7qmWISrMzrVYVpalX95hTSGa"
  timeout: 120

# Business server config (默认地址, 通道留空时使用)
server:
  url: "http://192.168.2.22:9200/api/objectInvadeDet"
  timeout: 15

# Redis config
redis:
  host: "localhost"
  port: 6379
  db: 0
  dify_queue: "dify_queue"
  server_queue: "server_queue"
